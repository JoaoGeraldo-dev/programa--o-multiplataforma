    <title>Document</title>
    <script>
        function ObjetoTeste(){
            const person = {fname:"jhon", lname:"Doe", age:25};

            let text = "";
            for(let x in person){
                text += person[x];
            }

            console.log(text);
        }

        function ObjetoTeste2(){
            const pessoas = [{nome: 'Lucas', idade:45},
                            {nome:'Aline', idade:20}
        ];

        let text ="";
        for(let x in pessoas){
            text+=pessoas[x].nome+"";
        }
          document.getElementById("teste").innerHTML = text;
    }
          
    </script>
