<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Formulário ENEM</title>
</head>

<body>

<h2 align="center">Formulário para ENEM</h2>

<form>

<table align="center" border="1" width="700" cellpadding="10">

<tr>
<td>

<h3>1º Dados Pessoais</h3>

<label for="nome">Nome:</label><br>
<input type="text" id="nome" name="nome" size="50"><br><br>

<label for="data_nascimento">Data de Nascimento:</label><br>
<input type="date" id="data_nascimento" name="data_nascimento"><br><br>

<label for="idade">Idade:</label><br>
<input type="number" id="idade" name="idade"><br><br>

<label for="telefone">Telefone:</label><br>
<input type="tel" id="telefone" name="telefone"><br><br>

<label for="cpf">CPF:</label><br>
<input type="text" id="cpf" name="cpf"><br><br>

<label for="email">Email:</label><br>
<input type="email" id="email" name="email" size="40"><br><br>

<hr>

<h3>Biologia</h3>

<p>1) Qual é a função do coração?</p>
<input type="radio" id="bio1a" name="bio1" value="a">
<label for="bio1a">Produzir hormônios</label><br>

<input type="radio" id="bio1b" name="bio1" value="b">
<label for="bio1b">Bombear sangue</label><br>

<input type="radio" id="bio1c" name="bio1" value="c">
<label for="bio1c">Filtrar o ar</label><br><br>

<p>2) São mamíferos:</p>
<input type="checkbox" id="bio2a" name="bio2" value="a">
<label for="bio2a">Baleia</label><br>

<input type="checkbox" id="bio2b" name="bio2" value="b">
<label for="bio2b">Morcego</label><br>

<input type="checkbox" id="bio2c" name="bio2" value="c">
<label for="bio2c">Galinha</label><br>

<hr>

<h3>Matemática</h3>

<p>1) Quanto é 9 x 6?</p>
<input type="radio" id="mat1a" name="mat1" value="a">
<label for="mat1a">54</label><br>

<input type="radio" id="mat1b" name="mat1" value="b">
<label for="mat1b">56</label><br>

<input type="radio" id="mat1c" name="mat1" value="c">
<label for="mat1c">64</label><br><br>

<p>2) São múltiplos de 5:</p>
<input type="checkbox" id="mat2a" name="mat2" value="a">
<label for="mat2a">10</label><br>

<input type="checkbox" id="mat2b" name="mat2" value="b">
<label for="mat2b">15</label><br>

<input type="checkbox" id="mat2c" name="mat2" value="c">
<label for="mat2c">18</label><br>

<hr>

<h3>Português</h3>

<p>1) Verbo indica:</p>
<input type="radio" id="port1a" name="port1" value="a">
<label for="port1a">Ação</label><br>

<input type="radio" id="port1b" name="port1" value="b">
<label for="port1b">Cor</label><br>

<input type="radio" id="port1c" name="port1" value="c">
<label for="port1c">Objeto</label><br><br>

<hr>

<h3>História</h3>

<p>1) A Independência do Brasil aconteceu em:</p>
<input type="radio" id="hist1a" name="hist1" value="a">
<label for="hist1a">1500</label><br>

<input type="radio" id="hist1b" name="hist1" value="b">
<label for="hist1b">1822</label><br>

<input type="radio" id="hist1c" name="hist1" value="c">
<label for="hist1c">1889</label><br><br>

<hr>

<center>
<input type="submit" value="Enviar Prova">
<input type="reset" value="Limpar Respostas">
</center>

</td>
</tr>

</table>

</form>

</body>
</html>
