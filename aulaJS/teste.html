<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script>
        function controledeTexto(s){
        
          document.getElementById('palavra').style.display = s;   
           
        }


    </script>
</head>
<body>
    <p id="palavra">Texto inicial</p><br>

     <button onclick="controledeTexto('none')">sumir </button>
     <button onclick="controledeTexto('')">aparecer </button>
</body>
</html>
