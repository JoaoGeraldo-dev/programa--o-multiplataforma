<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 01</title>
</head>
<body>
    <h1>Cadastro funcionário</h1>
    <form action="teste.jsp" method="post">
        <label for="codFunc">Código funcionário:</label>
        <input type="number" name="codFunc" id="codFunc"><br>
        <label for="nome">Nome do funcionario:</label>
        <input type="text" name="nome" id="nome"><br>     
        <label for="salario">Salario do funcionario:</label>
        <input type="number" name="salario" id="salario"><br><br>
        
        <h1>Escolha a função</h1>
        <input type="radio" id="sec" name="funcao">
        <label for="sec">Secretário(a)</label><br>
        <input type="radio" id="mot" name="funcao">
        <label for="mot">Motorista</label><br>
        <input type="radio" id="rad" name="funcao"></input>
        <label for="rad">Radialista</label><br>      

        <h1>Tipos de projetos Envolvido dentro da empresa:</h1>
        <input type="checkbox" id="proj1" name="proj1">
        <label for="proj1">Projeto "Aprender"</label><br>
        <input type="checkbox" id="proj2" name="proj2">
        <label for="proj2">Projeto "Vida em sociedade"</label><br>
        <input type="checkbox" id="proj3" name="proj3">
        <label for="proj3">Projeto "Cantare"</label><br>
        <input type="color"> <br>
        <input type="date"><br>
         <input type="datetime-local"><br>
        <input type="email"><br>
        <input type="file"><br>
        <input type="hidden" name="teste" value="123">
        <input type="image"><br>
        <input type="month"><br>
        <input type="range">
        <br>
        <input type="submit" value="Salvar">
    </form>
</body>
</html>
